name: 01 - bun Code Lint
on: [push]
jobs:
  lint-job:
    runs-on: ubuntu-latest
    steps:
      - name: chekout code
        uses: actions/checkout@v4
      - name: setup bun
        uses: oven-sh/setup-bun@v2
        with: 
          bun-version: latest
      - name: install dependencies
        run: bun install --frozen-lockfile
      - name: Run Linter
        run: bun run lint
