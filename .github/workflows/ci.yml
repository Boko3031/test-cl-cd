name: 01 - bun Code Lint
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-job:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    steps:
      - name: chekout code
        uses: actions/checkout@v4
      - name: setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: install dependencies
        run: bun install --frozen-lockfile
      - name: Run Linter
        run: bun run lint
      - name: Run Tests
        run: npm test
      - name: Build Project
        run: npm run build --if-present
